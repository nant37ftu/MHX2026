<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>LeadHub</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%233B82F6'/%3E%3Ctext x='50%25' y='58%25' text-anchor='middle' font-family='Segoe UI,Arial' font-size='34' fill='white' font-weight='700'%3ELH%3C/text%3E%3C/svg%3E" />

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
:root {
  /* brand */
  --primary:        #3B82F6;
  --primary-hover:  #2563EB;
  --primary-bg:     #EFF6FF;

  /* surface */
  --bg:             #F8FAFC;
  --surface:        #FFFFFF;
  --surface-alt:    #F1F5F9;
  --border:         #E2E8F0;
  --border-strong:  #CBD5E1;

  /* text */
  --text:           #0F172A;
  --text-muted:     #64748B;
  --text-faint:     #94A3B8;

  /* semantic */
  --success:        #16A34A; --success-bg: #F0FDF4;
  --warn:           #EA580C; --warn-bg:    #FFF7ED;
  --danger:         #DC2626; --danger-bg:  #FEF2F2;
  --info:           #0891B2; --info-bg:    #ECFEFF;

  /* area colors */
  --area-pm:        #7C3AED;
  --area-tech:      #1D4ED8;
  --area-content:   #16A34A;
  --area-ops:       #EA580C;

  /* status colors */
  --st-backlog:     #94A3B8;
  --st-todo:        #3B82F6;
  --st-doing:       #F59E0B;
  --st-review:      #A855F7;
  --st-done:        #16A34A;

  /* layout */
  --sidebar-w:      232px;
  --topbar-h:       56px;
  --radius:         10px;
  --radius-sm:      6px;
  --shadow-1:       0 1px 2px rgba(15,23,42,.06), 0 1px 3px rgba(15,23,42,.08);
  --shadow-2:       0 4px 16px rgba(15,23,42,.08);
}

* { box-sizing: border-box; }
html, body, #root { height: 100%; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Inter', 'Roboto', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}
h1 { font-size: 22px; font-weight: 600; margin: 0; }
h2 { font-size: 18px; font-weight: 600; margin: 0; }
h3 { font-size: 16px; font-weight: 600; margin: 0; }
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; font-size: inherit; }

/* ============================== LOGIN / PINPAD ============================== */
.login-shell {
  min-height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #EEF2FF 0%, #F8FAFC 60%, #EFF6FF 100%);
  padding: 24px;
}
.login-card {
  width: 100%; max-width: 380px;
  background: var(--surface);
  border-radius: 16px;
  box-shadow: var(--shadow-2);
  padding: 28px 24px;
}
.login-brand {
  text-align: center;
  margin-bottom: 18px;
}
.login-brand .logo {
  width: 56px; height: 56px;
  border-radius: 14px;
  background: var(--primary);
  color: white;
  display: inline-flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 22px;
  margin-bottom: 10px;
}
.login-brand .title { font-size: 20px; font-weight: 700; }
.login-brand .sub { color: var(--text-muted); font-size: 13px; margin-top: 2px; }

.user-chips {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  margin: 14px 0 18px;
}
.user-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px;
  background: var(--surface-alt);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 12px;
  color: var(--text-muted);
}
.user-chip .av {
  width: 22px; height: 22px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  color: white; font-size: 11px; font-weight: 600;
}

.pin-dots {
  display: flex; justify-content: center; gap: 14px;
  margin: 12px 0 18px;
}
.pin-dots span {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--surface-alt);
  border: 1px solid var(--border-strong);
  transition: all .15s;
}
.pin-dots span.filled {
  background: var(--primary);
  border-color: var(--primary);
  transform: scale(1.05);
}
.pin-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
}
.pin-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  height: 56px;
  font-size: 20px; font-weight: 600;
  color: var(--text);
  transition: all .1s;
}
.pin-btn:hover { background: var(--surface-alt); border-color: var(--border-strong); }
.pin-btn:active { transform: scale(.97); }
.pin-btn.muted { color: var(--text-muted); font-size: 14px; font-weight: 500; }

.pin-error {
  text-align: center;
  color: var(--danger);
  font-size: 13px;
  min-height: 18px;
  margin-top: 10px;
}
.login-version {
  text-align: center;
  color: var(--text-faint);
  font-size: 11px;
  margin-top: 14px;
}

/* ============================== APP LAYOUT ============================== */
.app-shell {
  display: flex;
  height: 100%;
  background: var(--bg);
}
.sidebar {
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  flex-shrink: 0;
  transition: transform .25s;
}
.sb-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.sb-brand .logo {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--primary);
  color: white;
  display: inline-flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px;
}
.sb-brand .name { font-weight: 700; font-size: 15px; }
.sb-brand .proj { font-size: 11px; color: var(--text-muted); }

.sb-nav { flex: 1; padding: 8px; overflow-y: auto; }
.sb-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  color: var(--text);
  background: transparent;
  border: none;
  width: 100%; text-align: left;
  font-size: 14px;
  margin-bottom: 2px;
}
.sb-nav-item:hover { background: var(--surface-alt); }
.sb-nav-item.active {
  background: var(--primary-bg);
  color: var(--primary-hover);
  font-weight: 600;
}
.sb-nav-item .ic { font-size: 16px; width: 18px; text-align: center; }

.sb-foot {
  padding: 10px;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 8px;
}
.sb-user {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 8px;
  border-radius: var(--radius-sm);
  background: var(--surface-alt);
}
.sb-user .av {
  width: 32px; height: 32px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  color: white; font-size: 12px; font-weight: 600;
}
.sb-user .info { flex: 1; min-width: 0; }
.sb-user .nm { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-user .rl { font-size: 11px; color: var(--text-muted); }
.sb-user .logout {
  background: transparent; border: none; padding: 4px 6px;
  color: var(--text-muted); border-radius: 6px;
}
.sb-user .logout:hover { background: var(--danger-bg); color: var(--danger); }

.conn-row {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--text-muted);
  padding: 0 4px;
}
.conn-dot { width: 8px; height: 8px; border-radius: 50%; }
.conn-dot.live { background: var(--success); }
.conn-dot.connecting { background: var(--warn); animation: pulse 1.2s infinite; }
.conn-dot.offline { background: var(--danger); }
.conn-dot.mock { background: var(--text-faint); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

.app-main {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
}
.topbar {
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 18px;
  gap: 14px;
  flex-shrink: 0;
}
.hamburger {
  display: none;
  background: transparent; border: none;
  padding: 6px; border-radius: 6px;
  font-size: 20px;
}
.hamburger:hover { background: var(--surface-alt); }
.tb-title { flex: 1; font-size: 15px; font-weight: 600; }
.tb-actions { display: flex; gap: 8px; align-items: center; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 13px; font-weight: 500;
  color: var(--text);
  min-height: 34px;
}
.btn:hover { background: var(--surface-alt); }
.btn.primary {
  background: var(--primary); border-color: var(--primary); color: white;
}
.btn.primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
.btn.ghost { border-color: transparent; background: transparent; }

.content {
  flex: 1; overflow-y: auto;
  padding: 20px;
}

/* ============================== DASHBOARD ============================== */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--shadow-1);
}
.stat-card .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .03em; }
.stat-card .value { font-size: 24px; font-weight: 700; margin-top: 4px; }
.stat-card .sub { font-size: 11px; color: var(--text-faint); margin-top: 2px; }

.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-1);
}
.section h3 { margin-bottom: 12px; }

.goal-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.goal-row:last-child { border-bottom: none; }
.goal-row .title { flex: 1; font-size: 13px; }
.goal-row .bar {
  flex: 0 0 140px;
  height: 8px; border-radius: 999px;
  background: var(--surface-alt); overflow: hidden;
}
.goal-row .bar > span { display: block; height: 100%; background: var(--primary); }
.goal-row .count { width: 60px; text-align: right; font-size: 12px; color: var(--text-muted); }

.due-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.due-row:last-child { border-bottom: none; }
.due-row .pri {
  width: 6px; height: 24px; border-radius: 3px;
}
.due-row .pri.high { background: var(--danger); }
.due-row .pri.urgent { background: var(--danger); }
.due-row .pri.normal { background: var(--primary); }
.due-row .pri.low { background: var(--text-faint); }
.due-row .title { flex: 1; }
.due-row .date { font-size: 12px; color: var(--text-muted); }
.due-row .date.overdue { color: var(--danger); font-weight: 600; }

/* ============================== KANBAN ============================== */
.kanban {
  display: grid;
  grid-template-columns: repeat(5, minmax(240px, 1fr));
  gap: 12px;
  align-items: start;
  min-height: 200px;
}
.kb-col {
  background: var(--surface-alt);
  border-radius: var(--radius);
  padding: 10px;
  min-height: 200px;
}
.kb-col-head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
  font-size: 13px; font-weight: 600;
}
.kb-col-head .dot { width: 8px; height: 8px; border-radius: 50%; }
.kb-col-head .count { color: var(--text-muted); font-weight: 500; font-size: 12px; }
.kb-col-head .plus {
  margin-left: auto;
  background: transparent; border: none;
  width: 24px; height: 24px; border-radius: 6px;
  color: var(--text-muted);
}
.kb-col-head .plus:hover { background: var(--surface); color: var(--text); }

.kb-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: box-shadow .15s, transform .1s;
}
.kb-card:hover { box-shadow: var(--shadow-1); }
.kb-card:active { transform: translateY(1px); }
.kb-card .title { font-size: 13px; font-weight: 500; margin-bottom: 8px; line-height: 1.4; }
.kb-card .meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

.badge {
  display: inline-flex; align-items: center;
  padding: 2px 7px;
  border-radius: 999px;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .02em;
}
.badge.area-pm      { background: #F5F3FF; color: var(--area-pm); }
.badge.area-tech    { background: #EFF6FF; color: var(--area-tech); }
.badge.area-content { background: #F0FDF4; color: var(--area-content); }
.badge.area-ops     { background: #FFF7ED; color: var(--area-ops); }
.badge.pri-high   { background: var(--danger-bg); color: var(--danger); }
.badge.pri-urgent { background: var(--danger-bg); color: var(--danger); }
.badge.pri-normal { background: var(--primary-bg); color: var(--primary-hover); }
.badge.pri-low    { background: var(--surface-alt); color: var(--text-muted); }

.avatar {
  width: 22px; height: 22px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  color: white; font-size: 10px; font-weight: 600;
}
.due-tag {
  font-size: 11px; color: var(--text-muted);
  margin-left: auto;
}
.due-tag.overdue { color: var(--danger); font-weight: 600; }

/* ============================== PLACEHOLDER ============================== */
.placeholder {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 50vh;
  color: var(--text-muted);
  text-align: center;
}
.placeholder .ic { font-size: 48px; margin-bottom: 12px; opacity: .4; }
.placeholder .ttl { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.placeholder .sub { font-size: 13px; max-width: 360px; }

/* ============================== TOAST ============================== */
.toast-stack {
  position: fixed;
  bottom: 20px; right: 20px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 1000;
  max-width: 360px;
}
.toast {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left-width: 4px;
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 13px;
  box-shadow: var(--shadow-2);
  animation: slideIn .2s;
}
.toast.success { border-left-color: var(--success); }
.toast.warn    { border-left-color: var(--warn); }
.toast.error   { border-left-color: var(--danger); }
.toast.info    { border-left-color: var(--info); }
@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ============================== SIDEBAR OVERLAY (mobile) ============================== */
.sb-overlay { display: none; }

/* ============================== RESPONSIVE ============================== */
@media (max-width: 1023px) {
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .kanban {
    overflow-x: auto;
    grid-auto-flow: column;
    grid-auto-columns: 260px;
    grid-template-columns: none;
    padding-bottom: 8px;
  }
}

@media (max-width: 768px) {
  :root { --sidebar-w: 240px; }
  .hamburger { display: inline-flex; }
  .sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    z-index: 200;
    transform: translateX(-100%);
    box-shadow: 2px 0 16px rgba(0,0,0,.15);
  }
  .sidebar.open { transform: translateX(0); }
  .sb-overlay {
    display: block;
    position: fixed; inset: 0;
    background: rgba(15,23,42,.45);
    z-index: 150;
  }
  .content { padding: 14px; }
  .stat-grid { gap: 10px; }
  .stat-card { padding: 10px 12px; }
  .stat-card .value { font-size: 20px; }
}

@media (max-width: 480px) {
  .stat-grid { grid-template-columns: 1fr; }
  .login-card { padding: 22px 18px; }
}

</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// =====================================================
// CONFIG
// =====================================================
const VERSION = "0.1.0";

// Phase 1 sẽ thay bằng credentials thật.
const SUPABASE_URL = "YOUR_SUPABASE_URL_HERE";
const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY_HERE";
const SUPABASE_READY = !SUPABASE_URL.startsWith("YOUR_") && !SUPABASE_KEY.startsWith("YOUR_");

const sb = SUPABASE_READY
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { realtime: { params: { eventsPerSecond: 10 } } })
  : null;

// =====================================================
// ROLE PERMISSIONS
// =====================================================
const ROLE_PERMS = {
  lead_pm:     { canManageUsers: true,  canDeleteAnyTask: true,  canSeeAllAreas: true  },
  lead_tech:   { canManageUsers: false, canDeleteAnyTask: false, canSeeAllAreas: true  },
  sub_content: { canManageUsers: false, canDeleteAnyTask: false, canSeeAllAreas: true  },
  sub_ops:     { canManageUsers: false, canDeleteAnyTask: false, canSeeAllAreas: true  },
};

const AREA_LABEL = { pm: "PM", tech: "Tech", content: "Content", ops: "Ops" };
const STATUS_COLS = [
  { k: "backlog", label: "Backlog", color: "var(--st-backlog)" },
  { k: "todo",    label: "Todo",    color: "var(--st-todo)"    },
  { k: "doing",   label: "Doing",   color: "var(--st-doing)"   },
  { k: "review",  label: "Review",  color: "var(--st-review)"  },
  { k: "done",    label: "Done",    color: "var(--st-done)"    },
];

// =====================================================
// MOCK DATA (Phase 0)
// =====================================================
const today = new Date();
const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x.toISOString().slice(0, 10); };

const MOCK_USERS = [
  { id: "u1", pin: "1001", fullName: "Leader A",     role: "lead_pm",     area: "pm",      color: "#7C3AED", isActive: true },
  { id: "u2", pin: "1002", fullName: "Leader B",     role: "lead_tech",   area: "tech",    color: "#1D4ED8", isActive: true },
  { id: "u3", pin: "1003", fullName: "Sub-leader C", role: "sub_content", area: "content", color: "#16A34A", isActive: true },
  { id: "u4", pin: "1004", fullName: "Sub-leader D", role: "sub_ops",     area: "ops",     color: "#EA580C", isActive: true },
];

const MOCK_PROJECT = { id: "p1", name: "Dự án Demo", description: "Project khởi tạo mặc định." };

const MOCK_GOALS = [
  { id: "g1", projectId: "p1", title: "Mốc 1 — Hoàn thiện sản phẩm v1", area: "tech",    dueAt: addDays(today, 30), status: "open" },
  { id: "g2", projectId: "p1", title: "Mốc 2 — Ra mắt và truyền thông",  area: "content", dueAt: addDays(today, 60), status: "open" },
];

const MOCK_TASKS = [
  { id: "t1", projectId: "p1", goalId: "g1", title: "Thiết kế kiến trúc hệ thống",     status: "doing",   priority: "high",   area: "tech",    assigneeId: "u2", startAt: addDays(today, 0),  dueAt: addDays(today, 7) },
  { id: "t2", projectId: "p1", goalId: "g1", title: "Code module auth",                status: "todo",    priority: "high",   area: "tech",    assigneeId: "u2", startAt: addDays(today, 3),  dueAt: addDays(today, 14) },
  { id: "t3", projectId: "p1", goalId: "g2", title: "Lập kế hoạch nội dung tuần 1-4",  status: "todo",    priority: "normal", area: "content", assigneeId: "u3", startAt: addDays(today, 7),  dueAt: addDays(today, 21) },
  { id: "t4", projectId: "p1", goalId: "g2", title: "Booking địa điểm ra mắt",         status: "backlog", priority: "normal", area: "ops",     assigneeId: "u4", startAt: addDays(today, 30), dueAt: addDays(today, 45) },
  { id: "t5", projectId: "p1", goalId: null, title: "Họp kick-off team",               status: "done",    priority: "high",   area: "pm",      assigneeId: "u1", startAt: addDays(today, -2), dueAt: addDays(today, -1) },
  { id: "t6", projectId: "p1", goalId: null, title: "Lên timeline tổng",               status: "review",  priority: "normal", area: "pm",      assigneeId: "u1", startAt: addDays(today, -1), dueAt: addDays(today, 2)  },
];

// =====================================================
// HELPERS
// =====================================================
const initials = (name) => {
  if (!name) return "?";
  const parts = name.trim().split(/\s+/);
  return parts.map(w => w[0]).slice(-2).join("").toUpperCase();
};
const isOverdue = (dueAt) => dueAt && new Date(dueAt) < new Date(new Date().toDateString());
const fmtDate = (s) => {
  if (!s) return "";
  const d = new Date(s);
  return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;
};

// =====================================================
// TOAST HOOK
// =====================================================
const useToast = () => {
  const [toasts, setToasts] = useState([]);
  const toast = useCallback((msg, type = "info") => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);
  return { toasts, toast };
};

// =====================================================
// PIN PAD
// =====================================================
function PinPad({ length = 4, onComplete, disabled }) {
  const [pin, setPin] = useState("");
  useEffect(() => { if (disabled) setPin(""); }, [disabled]);

  const press = (n) => {
    if (disabled) return;
    if (pin.length >= length) return;
    const next = pin + String(n);
    setPin(next);
    if (next.length === length) {
      setTimeout(() => { onComplete(next); setPin(""); }, 120);
    }
  };
  const clear = () => setPin("");
  const back = () => setPin(p => p.slice(0, -1));

  return (
    <>
      <div className="pin-dots">
        {Array.from({ length }).map((_, i) => (
          <span key={i} className={pin.length > i ? "filled" : ""} />
        ))}
      </div>
      <div className="pin-grid">
        {[1,2,3,4,5,6,7,8,9].map(n => (
          <button key={n} className="pin-btn" onClick={() => press(n)} disabled={disabled}>{n}</button>
        ))}
        <button className="pin-btn muted" onClick={clear} disabled={disabled}>Xoá</button>
        <button className="pin-btn" onClick={() => press(0)} disabled={disabled}>0</button>
        <button className="pin-btn muted" onClick={back} disabled={disabled}>⌫</button>
      </div>
    </>
  );
}

// =====================================================
// LOGIN
// =====================================================
function LoginScreen({ users, onLogin, toast }) {
  const [error, setError] = useState("");
  const [attempts, setAttempts] = useState(0);
  const [lockedUntil, setLockedUntil] = useState(0);
  const [tick, setTick] = useState(0);

  useEffect(() => {
    if (lockedUntil === 0) return;
    const t = setInterval(() => setTick(x => x + 1), 250);
    return () => clearInterval(t);
  }, [lockedUntil]);

  const locked = lockedUntil > Date.now();
  const remain = Math.max(0, Math.ceil((lockedUntil - Date.now()) / 1000));

  const tryLogin = (pin) => {
    if (locked) return;
    const u = users.find(x => x.pin === pin && x.isActive);
    if (u) {
      localStorage.setItem("leadhub_pin", pin);
      setError("");
      setAttempts(0);
      onLogin(u);
      toast(`Chào ${u.fullName}!`, "success");
    } else {
      const next = attempts + 1;
      setAttempts(next);
      if (next >= 3) {
        setLockedUntil(Date.now() + 10000);
        setError("Sai PIN 3 lần — khoá 10s.");
        setAttempts(0);
      } else {
        setError(`PIN không đúng (${next}/3)`);
      }
    }
  };

  return (
    <div className="login-shell">
      <div className="login-card">
        <div className="login-brand">
          <div className="logo">LH</div>
          <div className="title">LeadHub</div>
          <div className="sub">Đăng nhập bằng PIN 4 số</div>
        </div>

        <div className="user-chips">
          {users.map(u => (
            <div key={u.id} className="user-chip" title={`PIN: ${u.pin}`}>
              <span className="av" style={{ background: u.color }}>{initials(u.fullName)}</span>
              {u.fullName}
            </div>
          ))}
        </div>

        <PinPad onComplete={tryLogin} disabled={locked} />
        <div className="pin-error">
          {locked ? `Khoá nhập — thử lại sau ${remain}s` : error}
        </div>

        <div className="login-version">LeadHub v{VERSION} · Phase 0 — mock</div>
      </div>
    </div>
  );
}

// =====================================================
// SIDEBAR
// =====================================================

  { k: "kanban",    label: "Kanban",    ic: "▤" },
  { k: "timeline",  label: "Timeline",  ic: "═" },
  { k: "goals",     label: "Mục tiêu",  ic: "◎" },

];

// =====================================================
// TOPBAR
// =====================================================
function TopBar({ title, onMenu, onQuickAdd }) {
  return (
    <header className="topbar">
      <button className="hamburger" onClick={onMenu} aria-label="menu">☰</button>
      <div className="tb-title">{title}</div>
      <div className="tb-actions">
        <button className="btn primary" onClick={onQuickAdd}>+ Task</button>
      </div>
    </header>
  );
}

// =====================================================
// DASHBOARD
// =====================================================
function Dashboard({ tasks, goals, users }) {
  const todayStr = new Date().toDateString();
  const stats = useMemo(() => {
    const open = tasks.filter(t => t.status !== "done").length;
    const doing = tasks.filter(t => t.status === "doing").length;
    const overdue = tasks.filter(t => isOverdue(t.dueAt) && t.status !== "done").length;
    const doneThisWeek = tasks.filter(t => t.status === "done").length;
    return { open, doing, overdue, doneThisWeek };
  }, [tasks]);

  const goalProgress = useMemo(() => goals.map(g => {
    const its = tasks.filter(t => t.goalId === g.id);
    const done = its.filter(t => t.status === "done").length;
    return { ...g, done, total: its.length, pct: its.length ? Math.round(done / its.length * 100) : 0 };
  }), [tasks, goals]);

  const upcoming = useMemo(() => [...tasks]
    .filter(t => t.status !== "done" && t.dueAt)
    .sort((a, b) => a.dueAt.localeCompare(b.dueAt))
    .slice(0, 5),
  [tasks]);

  return (
    <div>
      <div className="stat-grid">
        <div className="stat-card">
          <div className="label">Đang mở</div>
          <div className="value">{stats.open}</div>
          <div className="sub">Tổng task chưa done</div>
        </div>
        <div className="stat-card">
          <div className="label">Đang làm</div>
          <div className="value" style={{ color: "var(--st-doing)" }}>{stats.doing}</div>
          <div className="sub">Status: doing</div>
        </div>
        <div className="stat-card">
          <div className="label">Quá hạn</div>
          <div className="value" style={{ color: "var(--danger)" }}>{stats.overdue}</div>
          <div className="sub">Cần xử lý gấp</div>
        </div>
        <div className="stat-card">
          <div className="label">Hoàn thành</div>
          <div className="value" style={{ color: "var(--success)" }}>{stats.doneThisWeek}</div>
          <div className="sub">Tuần này</div>
        </div>
      </div>

      <div className="section">
        <h3>Tiến độ mục tiêu</h3>
        {goalProgress.length === 0
          ? <div style={{ color: "var(--text-muted)", fontSize: 13, padding: 20, textAlign: "center" }}>Chưa có mục tiêu nào.</div>
          : goalProgress.map(g => (
              <div key={g.id} className="goal-row">
                <span className={`badge area-${g.area}`}>{AREA_LABEL[g.area]}</span>
                <span className="title">{g.title}</span>
                <div className="bar"><span style={{ width: g.pct + "%" }} /></div>
                <span className="count">{g.done}/{g.total}</span>
              </div>
            ))
        }
      </div>

      <div className="section">
        <h3>Task sắp đến deadline</h3>
        {upcoming.length === 0
          ? <div style={{ color: "var(--text-muted)", fontSize: 13, padding: 20, textAlign: "center" }}>Không có task nào sắp đến hạn.</div>
          : upcoming.map(t => (
              <div key={t.id} className="due-row">
                <span className={`pri ${t.priority}`} />
                <span className="title">{t.title}</span>
                <span className={`date ${isOverdue(t.dueAt) ? "overdue" : ""}`}>{fmtDate(t.dueAt)}</span>
              </div>
            ))
        }
      </div>
    </div>
  );
}

// =====================================================
// KANBAN
// =====================================================
function Kanban({ tasks, users, onCardClick }) {
  const userById = useMemo(() => Object.fromEntries(users.map(u => [u.id, u])), [users]);

  return (
    <div className="kanban">
      {STATUS_COLS.map(col => {
        const items = tasks.filter(t => t.status === col.k);
        return (
          <div key={col.k} className="kb-col">
            <div className="kb-col-head">
              <span className="dot" style={{ background: col.color }} />
              <span>{col.label}</span>
              <span className="count">{items.length}</span>
              <button className="plus" title="Thêm task">+</button>
            </div>
            {items.map(t => {
              const u = userById[t.assigneeId];
              return (
                <div key={t.id} className="kb-card" onClick={() => onCardClick?.(t)}>
                  <div className="title">{t.title}</div>
                  <div className="meta">
                    <span className={`badge area-${t.area}`}>{AREA_LABEL[t.area]}</span>
                    <span className={`badge pri-${t.priority}`}>{t.priority}</span>
                    {u && <span className="avatar" style={{ background: u.color }} title={u.fullName}>{initials(u.fullName)}</span>}
                    {t.dueAt && <span className={`due-tag ${isOverdue(t.dueAt) ? "overdue" : ""}`}>{fmtDate(t.dueAt)}</span>}
                  </div>
                </div>
              );
            })}
            {items.length === 0 && (
              <div style={{ fontSize: 12, color: "var(--text-faint)", textAlign: "center", padding: "16px 0" }}>
                Trống
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// =====================================================
// PLACEHOLDER SCREEN
// =====================================================
function Placeholder({ icon, title, note }) {
  return (
    <div className="placeholder">
      <div className="ic">{icon}</div>
      <div className="ttl">{title}</div>
      <div className="sub">{note}</div>

// =====================================================
// APP
// =====================================================
function App() {
  const { toasts, toast } = useToast();

  // Phase 0: hardcoded mock state. Phase 1 sẽ thay bằng useStateSync.
  const [users] = useState(MOCK_USERS);
  const [goals] = useState(MOCK_GOALS);
  const [tasks] = useState(MOCK_TASKS);

  const [currentUser, setCurrentUser] = useState(null);
  const [screen, setScreen] = useState("dashboard");
  const [sbOpen, setSbOpen] = useState(false);
  const [connStatus] = useState(SUPABASE_READY ? "connecting" : "mock");

  // Auto-login từ localStorage
  useEffect(() => {
    const savedPin = localStorage.getItem("leadhub_pin");
    if (savedPin) {
      const u = users.find(x => x.pin === savedPin && x.isActive);
      if (u) setCurrentUser(u);
      else localStorage.removeItem("leadhub_pin");
    }
  }, [users]);

  const logout = () => {
    localStorage.removeItem("leadhub_pin");
    setCurrentUser(null);
    setScreen("dashboard");
  };

  if (!currentUser) {
    return (
      <>
        <LoginScreen users={users} onLogin={setCurrentUser} toast={toast} />
        <ToastStack toasts={toasts} />
      </>
    );
  }

  const myTasks = tasks.filter(t => t.assigneeId === currentUser.id);
  const screenTitle = NAV_ITEMS.find(n => n.k === screen)?.label || "LeadHub";

  let body;
  switch (screen) {
    case "dashboard":
      body = <Dashboard tasks={tasks} goals={goals} users={users} />; break;
    case "kanban":
      body = <Kanban tasks={tasks} users={users} onCardClick={(t) => toast(`Mở task: ${t.title}`, "info")} />; break;
    case "timeline":
      body = <Placeholder icon="═" title="Timeline — Coming…" note="Phase 2: Gantt-lite ngang theo start_at → due_at, group theo mảng hoặc assignee." />; break;
    case "goals":
      body = <Placeholder icon="◎" title="Mục tiêu — Coming…" note="Phase 2: list goals + progress bar tự tính từ task con, expand task con inline." />; break;
    case "mytasks":
      body = <Kanban tasks={myTasks} users={users} onCardClick={(t) => toast(`Mở task: ${t.title}`, "info")} />; break;
    case "settings":
      body = <Placeholder icon="⚙" title="Cài đặt — Coming…" note="Phase 2: tabs Users / Project / About. Chỉ lead_pm thấy." />; break;
    default:
      body = <Placeholder icon="?" title="Không tìm thấy" note="Màn hình không hợp lệ." />;
  }

  return (
    <>
      <div className="app-shell">
        <Sidebar
          open={sbOpen}
          onClose={() => setSbOpen(false)}
          screen={screen}
          setScreen={setScreen}
          currentUser={currentUser}
          onLogout={logout}
          connStatus={connStatus}
        />
        <main className="app-main">
          <TopBar
            title={screenTitle}
            onMenu={() => setSbOpen(true)}
            onQuickAdd={() => toast("Quick + Task — Phase 1 sẽ wire modal tạo task.", "info")}
          />
          <div className="content">{body}</div>
        </main>
      </div>
      <ToastStack toasts={toasts} />
    </>
  );
}

// =====================================================
// TOAST STACK
// =====================================================
function ToastStack({ toasts }) {
  return (
    <div className="toast-stack">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>
      ))}
    </div>
  );
}

// =====================================================
// MOUNT
// =====================================================
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>

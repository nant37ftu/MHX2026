<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>LeadHub</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%233B82F6'/%3E%3Ctext x='50%25' y='58%25' text-anchor='middle' font-family='Segoe UI,Arial' font-size='34' fill='white' font-weight='700'%3ELH%3C/text%3E%3C/svg%3E" />

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
:root {
  --primary:        #3B82F6;
  --primary-hover:  #2563EB;
  --primary-bg:     #EFF6FF;

  --bg:             #F8FAFC;
  --surface:        #FFFFFF;
  --surface-alt:    #F1F5F9;
  --border:         #E2E8F0;
  --border-strong:  #CBD5E1;

  --text:           #0F172A;
  --text-muted:     #64748B;
  --text-faint:     #94A3B8;

  --success:        #16A34A; --success-bg: #F0FDF4;
  --warn:           #EA580C; --warn-bg:    #FFF7ED;
  --danger:         #DC2626; --danger-bg:  #FEF2F2;
  --info:           #0891B2; --info-bg:    #ECFEFF;

  --area-pm:        #7C3AED;
  --area-tech:      #1D4ED8;
  --area-content:   #16A34A;
  --area-ops:       #EA580C;

  --st-backlog:     #94A3B8;
  --st-todo:        #3B82F6;
  --st-doing:       #F59E0B;
  --st-review:      #A855F7;
  --st-done:        #16A34A;

  --sidebar-w:      232px;
  --topbar-h:       56px;
  --radius:         10px;
  --radius-sm:      6px;
  --shadow-1:       0 1px 2px rgba(15,23,42,.06), 0 1px 3px rgba(15,23,42,.08);
  --shadow-2:       0 4px 16px rgba(15,23,42,.08);
  --shadow-3:       0 20px 50px rgba(15,23,42,.18);
}

* { box-sizing: border-box; }
html, body, #root { height: 100%; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Inter', 'Roboto', sans-serif;
  font-size: 14px; line-height: 1.5;
  color: var(--text); background: var(--bg);
  -webkit-font-smoothing: antialiased;
}
h1 { font-size: 22px; font-weight: 600; margin: 0; }
h2 { font-size: 18px; font-weight: 600; margin: 0; }
h3 { font-size: 16px; font-weight: 600; margin: 0; }
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; font-size: inherit; }

/* ============================== LOGIN ============================== */
.login-shell {
  min-height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #EEF2FF 0%, #F8FAFC 60%, #EFF6FF 100%);
  padding: 24px;
}
.login-card {
  width: 100%; max-width: 380px;
  background: var(--surface); border-radius: 16px;
  box-shadow: var(--shadow-2); padding: 28px 24px;
}
.login-brand { text-align: center; margin-bottom: 18px; }
.login-brand .logo {
  width: 56px; height: 56px; border-radius: 14px;
  background: var(--primary); color: white;
  display: inline-flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 22px; margin-bottom: 10px;
}
.login-brand .title { font-size: 20px; font-weight: 700; }
.login-brand .sub { color: var(--text-muted); font-size: 13px; margin-top: 2px; }

.user-chips {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  margin: 14px 0 18px;
}
.user-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px; background: var(--surface-alt);
  border: 1px solid var(--border); border-radius: 999px;
  font-size: 12px; color: var(--text-muted);
}
.user-chip .av {
  width: 22px; height: 22px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  color: white; font-size: 11px; font-weight: 600;
}

.pin-dots { display: flex; justify-content: center; gap: 14px; margin: 12px 0 18px; }
.pin-dots span {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--surface-alt); border: 1px solid var(--border-strong);
  transition: all .15s;
}
.pin-dots span.filled { background: var(--primary); border-color: var(--primary); transform: scale(1.05); }
.pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.pin-btn {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); height: 56px;
  font-size: 20px; font-weight: 600; color: var(--text);
  transition: all .1s;
}
.pin-btn:hover { background: var(--surface-alt); border-color: var(--border-strong); }
.pin-btn:active { transform: scale(.97); }
.pin-btn.muted { color: var(--text-muted); font-size: 14px; font-weight: 500; }
.pin-error { text-align: center; color: var(--danger); font-size: 13px; min-height: 18px; margin-top: 10px; }
.login-version { text-align: center; color: var(--text-faint); font-size: 11px; margin-top: 14px; }

/* ============================== LAYOUT ============================== */
.app-shell { display: flex; height: 100%; background: var(--bg); }
.sidebar {
  width: var(--sidebar-w); background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  flex-shrink: 0; transition: transform .25s;
}
.sb-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px; border-bottom: 1px solid var(--border);
}
.sb-brand .logo {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--primary); color: white;
  display: inline-flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px;
}
.sb-brand .name { font-weight: 700; font-size: 15px; }
.sb-brand .proj { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }

.sb-nav { flex: 1; padding: 8px; overflow-y: auto; }
.sb-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: var(--radius-sm);
  color: var(--text); background: transparent; border: none;
  width: 100%; text-align: left; font-size: 14px; margin-bottom: 2px;
}
.sb-nav-item:hover { background: var(--surface-alt); }
.sb-nav-item.active { background: var(--primary-bg); color: var(--primary-hover); font-weight: 600; }
.sb-nav-item .ic { font-size: 16px; width: 18px; text-align: center; }

.sb-foot { padding: 10px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
.sb-user {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 8px; border-radius: var(--radius-sm); background: var(--surface-alt);
}
.sb-user .av {
  width: 32px; height: 32px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  color: white; font-size: 12px; font-weight: 600;
}
.sb-user .info { flex: 1; min-width: 0; }
.sb-user .nm { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-user .rl { font-size: 11px; color: var(--text-muted); }
.sb-user .logout { background: transparent; border: none; padding: 4px 6px; color: var(--text-muted); border-radius: 6px; }
.sb-user .logout:hover { background: var(--danger-bg); color: var(--danger); }

.conn-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); padding: 0 4px; }
.conn-dot { width: 8px; height: 8px; border-radius: 50%; }
.conn-dot.live { background: var(--success); }
.conn-dot.connecting { background: var(--warn); animation: pulse 1.2s infinite; }
.conn-dot.offline { background: var(--danger); }
.conn-dot.mock { background: var(--text-faint); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

.app-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.topbar {
  height: var(--topbar-h); background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 18px; gap: 14px; flex-shrink: 0;
}
.hamburger { display: none; background: transparent; border: none; padding: 6px; border-radius: 6px; font-size: 20px; }
.hamburger:hover { background: var(--surface-alt); }
.tb-title { flex: 1; font-size: 15px; font-weight: 600; }
.tb-actions { display: flex; gap: 8px; align-items: center; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--surface);
  font-size: 13px; font-weight: 500; color: var(--text); min-height: 34px;
}
.btn:hover { background: var(--surface-alt); }
.btn.primary { background: var(--primary); border-color: var(--primary); color: white; }
.btn.primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
.btn.danger { background: var(--danger); border-color: var(--danger); color: white; }
.btn.danger:hover { background: #B91C1C; border-color: #B91C1C; }
.btn.ghost { border-color: transparent; background: transparent; }
.btn.sm { padding: 5px 9px; min-height: 28px; font-size: 12px; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

.content { flex: 1; overflow-y: auto; padding: 20px; }

/* ============================== DASHBOARD ============================== */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow-1);
}
.stat-card .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .03em; }
.stat-card .value { font-size: 24px; font-weight: 700; margin-top: 4px; }
.stat-card .sub { font-size: 11px; color: var(--text-faint); margin-top: 2px; }

.section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow-1);
}
.section h3 { margin-bottom: 12px; }
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.section-head h3 { margin: 0; }

.goal-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.goal-row:last-child { border-bottom: none; }
.goal-row .title { flex: 1; font-size: 13px; }
.goal-row .bar { flex: 0 0 140px; height: 8px; border-radius: 999px; background: var(--surface-alt); overflow: hidden; }
.goal-row .bar > span { display: block; height: 100%; background: var(--primary); transition: width .3s; }
.goal-row .count { width: 60px; text-align: right; font-size: 12px; color: var(--text-muted); }

.due-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; cursor: pointer; border-radius: 4px; }
.due-row:hover { background: var(--surface-alt); }
.due-row:last-child { border-bottom: none; }
.due-row .pri { width: 6px; height: 24px; border-radius: 3px; flex-shrink: 0; }
.due-row .pri.high, .due-row .pri.urgent { background: var(--danger); }
.due-row .pri.normal { background: var(--primary); }
.due-row .pri.low { background: var(--text-faint); }
.due-row .title { flex: 1; }
.due-row .date { font-size: 12px; color: var(--text-muted); }
.due-row .date.overdue { color: var(--danger); font-weight: 600; }

/* ============================== KANBAN ============================== */
.kanban {
  display: grid; grid-template-columns: repeat(5, minmax(240px, 1fr));
  gap: 12px; align-items: start; min-height: 200px;
}
.kb-col { background: var(--surface-alt); border-radius: var(--radius); padding: 10px; min-height: 200px; }
.kb-col-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 13px; font-weight: 600; }
.kb-col-head .dot { width: 8px; height: 8px; border-radius: 50%; }
.kb-col-head .count { color: var(--text-muted); font-weight: 500; font-size: 12px; }
.kb-col-head .plus { margin-left: auto; background: transparent; border: none; width: 24px; height: 24px; border-radius: 6px; color: var(--text-muted); }
.kb-col-head .plus:hover { background: var(--surface); color: var(--text); }

.kb-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px; margin-bottom: 8px;
  cursor: pointer; transition: box-shadow .15s, transform .1s;
}
.kb-card:hover { box-shadow: var(--shadow-1); }
.kb-card:active { transform: translateY(1px); }
.kb-card .title { font-size: 13px; font-weight: 500; margin-bottom: 8px; line-height: 1.4; }
.kb-card .meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

.badge {
  display: inline-flex; align-items: center;
  padding: 2px 7px; border-radius: 999px;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .02em;
}
.badge.area-pm      { background: #F5F3FF; color: var(--area-pm); }
.badge.area-tech    { background: #EFF6FF; color: var(--area-tech); }
.badge.area-content { background: #F0FDF4; color: var(--area-content); }
.badge.area-ops     { background: #FFF7ED; color: var(--area-ops); }
.badge.pri-high, .badge.pri-urgent { background: var(--danger-bg); color: var(--danger); }
.badge.pri-normal { background: var(--primary-bg); color: var(--primary-hover); }
.badge.pri-low    { background: var(--surface-alt); color: var(--text-muted); }
.badge.st-backlog { background: #F1F5F9; color: var(--st-backlog); }
.badge.st-todo    { background: #EFF6FF; color: var(--st-todo); }
.badge.st-doing   { background: #FEF3C7; color: var(--st-doing); }
.badge.st-review  { background: #F5F3FF; color: var(--st-review); }
.badge.st-done    { background: #F0FDF4; color: var(--st-done); }

.avatar {
  width: 22px; height: 22px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  color: white; font-size: 10px; font-weight: 600;
}
.due-tag { font-size: 11px; color: var(--text-muted); margin-left: auto; }
.due-tag.overdue { color: var(--danger); font-weight: 600; }

/* ============================== TIMELINE ============================== */
.tl-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.tl-toolbar .sw { display: inline-flex; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; background: var(--surface); }
.tl-toolbar .sw button { background: transparent; border: none; padding: 6px 12px; font-size: 12px; color: var(--text-muted); }
.tl-toolbar .sw button.on { background: var(--primary); color: white; }

.timeline {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 0;
  box-shadow: var(--shadow-1); overflow: auto;
}
.tl-grid { min-width: 800px; }
.tl-row { display: grid; grid-template-columns: 200px 1fr; border-bottom: 1px solid var(--border); }
.tl-row:last-child { border-bottom: none; }
.tl-row.tl-head { background: var(--surface-alt); font-size: 11px; color: var(--text-muted); }
.tl-row.tl-group { background: var(--bg); }
.tl-row.tl-group .tl-label { font-weight: 600; color: var(--text); padding: 6px 12px; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
.tl-label {
  padding: 8px 12px; font-size: 13px;
  border-right: 1px solid var(--border);
  background: var(--surface);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: flex; align-items: center;
}
.tl-row.tl-task .tl-label { color: var(--text); }
.tl-row.tl-head .tl-label { background: var(--surface-alt); }
.tl-bars { position: relative; height: 36px; background-image: linear-gradient(to right, var(--border) 1px, transparent 1px); background-size: calc(100% / var(--days, 30)) 100%; }
.tl-row.tl-head .tl-bars { height: 28px; }
.tl-row.tl-head .tl-bars span {
  position: absolute; top: 50%; transform: translateY(-50%);
  font-size: 10px; color: var(--text-muted);
  white-space: nowrap; padding: 0 4px;
}
.tl-row.tl-head .tl-bars span.today {
  color: var(--primary); font-weight: 600;
}
.tl-bar {
  position: absolute; top: 6px; height: 24px;
  border-radius: 5px; color: white; font-size: 11px;
  display: flex; align-items: center; padding: 0 8px;
  cursor: pointer; transition: filter .1s, transform .1s;
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  min-width: 8px;
}
.tl-bar:hover { filter: brightness(1.1); transform: translateY(-1px); }
.tl-today {
  position: absolute; top: 0; bottom: 0;
  width: 1.5px; background: var(--danger);
  z-index: 2;
}

/* ============================== GOALS VIEW ============================== */
.goals-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 14px;
}
.goal-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow-1);
}
.goal-card .gh { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.goal-card h3 { font-size: 15px; margin-bottom: 8px; }
.goal-card .bar { height: 8px; border-radius: 999px; background: var(--surface-alt); overflow: hidden; margin: 8px 0; }
.goal-card .bar > span { display: block; height: 100%; background: var(--primary); transition: width .3s; }
.goal-card .meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }
.goal-card .meta .pct { font-weight: 600; color: var(--text); }
.goal-card .task-list { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.goal-card .task-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: 6px;
  font-size: 12px; cursor: pointer;
}
.goal-card .task-row:hover { background: var(--surface-alt); }
.goal-card .task-row .ttl { flex: 1; }
.goal-card .task-row .ttl.done { text-decoration: line-through; color: var(--text-muted); }

/* ============================== SETTINGS ============================== */
.tabs {
  display: flex; gap: 4px; border-bottom: 1px solid var(--border);
  margin-bottom: 18px;
}
.tabs button {
  background: transparent; border: none; padding: 10px 16px;
  font-size: 14px; color: var(--text-muted); font-weight: 500;
  border-bottom: 2.5px solid transparent; margin-bottom: -1px;
}
.tabs button.on { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }

.user-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.user-table th { text-align: left; padding: 8px 10px; color: var(--text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; border-bottom: 1px solid var(--border); }
.user-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
.user-table tr:last-child td { border-bottom: none; }
.user-table input, .user-table select { background: transparent; border: 1px solid transparent; padding: 4px 6px; border-radius: 4px; width: 100%; }
.user-table input:hover, .user-table select:hover { border-color: var(--border); background: var(--surface); }
.user-table input:focus, .user-table select:focus { border-color: var(--primary); background: var(--surface); outline: none; }
.user-table .color-swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid var(--surface); box-shadow: 0 0 0 1px var(--border); }

/* ============================== STATES ============================== */
.placeholder {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 50vh; color: var(--text-muted); text-align: center;
}
.placeholder .ic { font-size: 48px; margin-bottom: 12px; opacity: .4; }
.placeholder .ttl { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.placeholder .sub { font-size: 13px; max-width: 360px; }

.loading-shell {
  display: flex; align-items: center; justify-content: center;
  min-height: 60vh; color: var(--text-muted);
}
.spinner {
  width: 28px; height: 28px; border-radius: 50%;
  border: 3px solid var(--surface-alt);
  border-top-color: var(--primary);
  animation: spin .8s linear infinite;
  margin-right: 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-banner {
  background: var(--danger-bg); border: 1px solid var(--danger);
  color: var(--danger); padding: 12px 16px; border-radius: var(--radius);
  margin-bottom: 14px; font-size: 13px;
}
.error-banner b { display: block; margin-bottom: 4px; }

/* ============================== TOAST ============================== */
.toast-stack {
  position: fixed; bottom: 20px; right: 20px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 1000; max-width: 360px;
}
.toast {
  background: var(--surface); border: 1px solid var(--border);
  border-left-width: 4px; border-radius: var(--radius-sm);
  padding: 10px 14px; font-size: 13px;
  box-shadow: var(--shadow-2); animation: slideIn .2s;
}
.toast.success { border-left-color: var(--success); }
.toast.warn    { border-left-color: var(--warn); }
.toast.error   { border-left-color: var(--danger); }
.toast.info    { border-left-color: var(--info); }
@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ============================== MODAL ============================== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 500; padding: 20px;
  animation: fadeIn .15s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface); border-radius: 14px;
  box-shadow: var(--shadow-3);

const taskToDb   = t => ({ id: t.id, project_id: t.projectId, goal_id: t.goalId, title: t.title, description: t.description, status: t.status, priority: t.priority, area: t.area, assignee_id: t.assigneeId, created_by: t.createdBy, start_at: t.startAt, due_at: t.dueAt, done_at: t.doneAt, checklist: t.checklist, tags: t.tags, sort_order: t.sortOrder });

const initials = (name) => {
  if (!name) return "?";
  const parts = name.trim().split(/\s+/);

};
const todayStart = () => { const d = new Date(); d.setHours(0,0,0,0); return d; };
const isOverdue = (dueAt) => dueAt && new Date(dueAt) < todayStart();
const fmtDate = (s) => {
  if (!s) return "";
  const d = new Date(s);
  return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;
};
const fmtDateTime = (s) => {
  if (!s) return "";
  const d = new Date(s);
  return `${fmtDate(s)} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
};
const fmtRelative = (s) => {
  if (!s) return "";
  const diff = (Date.now() - new Date(s).getTime()) / 1000;
  if (diff < 60) return "vừa xong";
  if (diff < 3600) return `${Math.floor(diff/60)} phút trước`;
  if (diff < 86400) return `${Math.floor(diff/3600)} giờ trước`;
  if (diff < 604800) return `${Math.floor(diff/86400)} ngày trước`;
  return fmtDateTime(s);
};
const newId = () => {
  if (window.crypto?.randomUUID) return window.crypto.randomUUID();
  return "id-" + Date.now() + "-" + Math.random().toString(36).slice(2, 9);
};
const toDate = (s) => s ? new Date(s) : null;

// Export CSV
const exportTasksCsv = (tasks, users, goals) => {
  const userById = Object.fromEntries(users.map(u => [u.id, u]));
  const goalById = Object.fromEntries(goals.map(g => [g.id, g]));
  const esc = (v) => {
    const s = String(v ?? "");
    return s.includes(",") || s.includes('"') || s.includes("\n") ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const header = ["Title","Status","Priority","Area","Assignee","Goal","Start","Due","Done","Description"];

    esc(t.startAt || ""), esc(t.dueAt || ""), esc(t.doneAt || ""), esc(t.description || ""),
  ].join(","));
  const csv = [header.join(","), ...rows].join("\n");
  const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8;" });

// =====================================================
// useStateSync — diff-wrapper auto-sync + realtime support
// =====================================================
function useStateSync(table, fromDb, toDb, onError) {
  const [data, _setData] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const ref = useRef([]);

  // Initial fetch
  useEffect(() => {
    if (!sb) { setLoading(false); return; }
    let cancelled = false;
    (async () => {
      const { data: rows, error: err } = await sb.from(table).select("*");
      if (cancelled) return;
      if (err) {
        setError(err);
        onError?.(`Lỗi tải ${table}: ${err.message}`);
        setLoading(false);
        return;
      }
      const mapped = (rows || []).map(fromDb);
      ref.current = mapped;
      _setData(mapped);
      setLoading(false);
    })();
    return () => { cancelled = true; };
  // eslint-disable-next-line
  }, [table]);

  const setData = useCallback((updater) => {
    const prev = ref.current;
    const next = typeof updater === "function" ? updater(prev) : updater;
    ref.current = next;
    _setData(next);

    if (!sb) return;
    const prevById = new Map(prev.map(x => [x.id, x]));
    const nextById = new Map(next.map(x => [x.id, x]));

    for (const [id] of prevById) {
      if (!nextById.has(id)) {
        sb.from(table).delete().eq("id", id).then(({ error: err }) => {
          if (err) onError?.(`Lỗi xoá ${table}: ${err.message}`);
        });
      }
    }
    for (const [id, item] of nextById) {
      const prevItem = prevById.get(id);
      if (!prevItem || JSON.stringify(prevItem) !== JSON.stringify(item)) {
        sb.from(table).upsert(toDb(item)).then(({ error: err }) => {
          if (err) onError?.(`Lỗi lưu ${table}: ${err.message}`);
        });
      }
    }
  }, [table, fromDb, toDb, onError]);

  // Realtime apply — bypass DB sync to avoid loops
  const applyRemote = useCallback((payload) => {
    if (payload.eventType === "DELETE") {
      const id = payload.old?.id;
      if (!id) return;
      const next = ref.current.filter(x => x.id !== id);
      ref.current = next;
      _setData(next);
    } else {
      const incoming = fromDb(payload.new);
      const existing = ref.current.find(x => x.id === incoming.id);
      if (existing && JSON.stringify(existing) === JSON.stringify(incoming)) return;
      const next = existing
        ? ref.current.map(x => x.id === incoming.id ? incoming : x)
        : [...ref.current, incoming];
      ref.current = next;
      _setData(next);
    }
  }, [fromDb]);

  return [data, setData, { loading, error, applyRemote }];
}

// =====================================================
// TOAST HOOK
// =====================================================
const useToast = () => {
  const [toasts, setToasts] = useState([]);
  const toast = useCallback((msg, type = "info") => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);
  return { toasts, toast };
};

// =====================================================
// PIN PAD
// =====================================================
function PinPad({ length = 4, onComplete, disabled }) {
  const [pin, setPin] = useState("");
  useEffect(() => { if (disabled) setPin(""); }, [disabled]);
  const press = (n) => {
    if (disabled || pin.length >= length) return;
    const next = pin + String(n);
    setPin(next);
    if (next.length === length) setTimeout(() => { onComplete(next); setPin(""); }, 120);
  };
  return (
    <>
      <div className="pin-dots">
        {Array.from({ length }).map((_, i) => <span key={i} className={pin.length > i ? "filled" : ""} />)}
      </div>
      <div className="pin-grid">
        {[1,2,3,4,5,6,7,8,9].map(n => (
          <button key={n} className="pin-btn" onClick={() => press(n)} disabled={disabled}>{n}</button>
        ))}
        <button className="pin-btn muted" onClick={() => setPin("")} disabled={disabled}>Xoá</button>
        <button className="pin-btn" onClick={() => press(0)} disabled={disabled}>0</button>
        <button className="pin-btn muted" onClick={() => setPin(p => p.slice(0,-1))} disabled={disabled}>⌫</button>
      </div>
    </>
  );
}

// =====================================================
// LOGIN
// =====================================================
function LoginScreen({ users, loading, error, onLogin, toast, onRetry }) {
  const [pinError, setPinError] = useState("");
  const [attempts, setAttempts] = useState(0);
  const [lockedUntil, setLockedUntil] = useState(0);
  const [, setTick] = useState(0);
  useEffect(() => {
    if (lockedUntil === 0) return;
    const t = setInterval(() => setTick(x => x + 1), 250);
    return () => clearInterval(t);
  }, [lockedUntil]);
  const locked = lockedUntil > Date.now();
  const remain = Math.max(0, Math.ceil((lockedUntil - Date.now()) / 1000));
  const tryLogin = (pin) => {
    if (locked) return;
    const u = users.find(x => x.pin === pin && x.isActive);
    if (u) {
      localStorage.setItem("leadhub_pin", pin);
      setPinError(""); setAttempts(0);
      onLogin(u); toast(`Chào ${u.fullName}!`, "success");
    } else {
      const next = attempts + 1; setAttempts(next);
      if (next >= 3) { setLockedUntil(Date.now() + 10000); setPinError("Sai PIN 3 lần — khoá 10s."); setAttempts(0); }
      else setPinError(`PIN không đúng (${next}/3)`);
    }
  };
  return (
    <div className="login-shell">
      <div className="login-card">
        <div className="login-brand">
          <div className="logo">LH</div>
          <div className="title">LeadHub</div>
          <div className="sub">Đăng nhập bằng PIN 4 số</div>
        </div>
        {error && (
          <div className="error-banner">
            <b>Không kết nối được Supabase</b>
            {error.message || String(error)}
            <div style={{ marginTop: 8 }}><button className="btn sm" onClick={onRetry}>Thử lại</button></div>
          </div>
        )}
        {loading ? (
          <div className="loading-shell" style={{ minHeight: 180 }}><div className="spinner" /> Đang tải users…</div>
        ) : (
          <>
            <div className="user-chips">
              {users.filter(u => u.isActive).map(u => (
                <div key={u.id} className="user-chip" title={`PIN: ${u.pin}`}>
                  <span className="av" style={{ background: u.color }}>{initials(u.fullName)}</span>
                  {u.fullName}
                </div>
              ))}
            </div>
            <PinPad onComplete={tryLogin} disabled={locked} />
            <div className="pin-error">{locked ? `Khoá nhập — thử lại sau ${remain}s` : pinError}</div>
          </>
        )}
        <div className="login-version">LeadHub v{VERSION}</div>
      </div>
    </div>
  );
}

// =====================================================
// DASHBOARD
// =====================================================
function Dashboard({ tasks, goals, onOpenTask }) {
  const stats = useMemo(() => ({
    open:    tasks.filter(t => t.status !== "done").length,
    doing:   tasks.filter(t => t.status === "doing").length,
    overdue: tasks.filter(t => isOverdue(t.dueAt) && t.status !== "done").length,
    done:    tasks.filter(t => t.status === "done").length,
  }), [tasks]);
  const goalProgress = useMemo(() => goals.map(g => {
    const its = tasks.filter(t => t.goalId === g.id);
    const done = its.filter(t => t.status === "done").length;
    return { ...g, done, total: its.length, pct: its.length ? Math.round(done / its.length * 100) : 0 };
  }), [tasks, goals]);
  const upcoming = useMemo(() => [...tasks]
    .filter(t => t.status !== "done" && t.dueAt)
    .sort((a, b) => a.dueAt.localeCompare(b.dueAt)).slice(0, 5), [tasks]);
  return (
    <div>
      <div className="stat-grid">
        <div className="stat-card"><div className="label">Đang mở</div><div className="value">{stats.open}</div><div className="sub">Task chưa done</div></div>
        <div className="stat-card"><div className="label">Đang làm</div><div className="value" style={{ color: "var(--st-doing)" }}>{stats.doing}</div><div className="sub">Status: doing</div></div>
        <div className="stat-card"><div className="label">Quá hạn</div><div className="value" style={{ color: "var(--danger)" }}>{stats.overdue}</div><div className="sub">Cần xử lý gấp</div></div>
        <div className="stat-card"><div className="label">Hoàn thành</div><div className="value" style={{ color: "var(--success)" }}>{stats.done}</div><div className="sub">Tổng done</div></div>
      </div>
      <div className="section">
        <h3>Tiến độ mục tiêu</h3>
        {goalProgress.length === 0
          ? <div style={{ color: "var(--text-muted)", fontSize: 13, padding: 20, textAlign: "center" }}>Chưa có mục tiêu nào.</div>
          : goalProgress.map(g => (
              <div key={g.id} className="goal-row">
                <span className={`badge area-${g.area}`}>{AREA_LABEL[g.area] || g.area}</span>
                <span className="title">{g.title}</span>
                <div className="bar"><span style={{ width: g.pct + "%" }} /></div>
                <span className="count">{g.done}/{g.total}</span>
              </div>
            ))
        }
      </div>
      <div className="section">
        <h3>Task sắp đến deadline</h3>
        {upcoming.length === 0
          ? <div style={{ color: "var(--text-muted)", fontSize: 13, padding: 20, textAlign: "center" }}>Không có task nào sắp đến hạn.</div>
          : upcoming.map(t => (
              <div key={t.id} className="due-row" onClick={() => onOpenTask?.(t)}>
                <span className={`pri ${t.priority}`} />
                <span className="title">{t.title}</span>
                <span className={`date ${isOverdue(t.dueAt) ? "overdue" : ""}`}>{fmtDate(t.dueAt)}</span>
              </div>
            ))
        }
      </div>
    </div>
  );
}

// =====================================================
// KANBAN — with search/filter + drag-drop
// =====================================================
function Kanban({ tasks, users, onCardClick, onAddInCol, onMoveTask, emptyMsg, showFilter }) {
  const userById = useMemo(() => Object.fromEntries(users.map(u => [u.id, u])), [users]);
  const [search, setSearch] = useState("");
  const [fArea, setFArea] = useState("");
  const [fAssignee, setFAssignee] = useState("");
  const [fPriority, setFPriority] = useState("");
  const [dragId, setDragId] = useState(null);
  const [dragOver, setDragOver] = useState(null);

  const hasFilter = search || fArea || fAssignee || fPriority;
  const filtered = useMemo(() => {
    let list = tasks;
    if (search) { const q = search.toLowerCase(); list = list.filter(t => t.title.toLowerCase().includes(q)); }
    if (fArea) list = list.filter(t => t.area === fArea);
    if (fAssignee) list = list.filter(t => t.assigneeId === fAssignee);
    if (fPriority) list = list.filter(t => t.priority === fPriority);
    return list;
  }, [tasks, search, fArea, fAssignee, fPriority]);

  const clearFilters = () => { setSearch(""); setFArea(""); setFAssignee(""); setFPriority(""); };

  // Drag handlers
  const onDragStart = (e, taskId) => { setDragId(taskId); e.dataTransfer.effectAllowed = "move"; };
  const onDragEnd = () => { setDragId(null); setDragOver(null); };
  const onDragOverCol = (e, colK) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; setDragOver(colK); };
  const onDragLeaveCol = () => setDragOver(null);
  const onDrop = (e, colK) => {
    e.preventDefault(); setDragOver(null);
    if (!dragId || !onMoveTask) return;
    const task = tasks.find(t => t.id === dragId);
    if (task && task.status !== colK) onMoveTask(task, colK);
    setDragId(null);
  };

  if (tasks.length === 0 && emptyMsg && !hasFilter) return <Placeholder icon="▤" title="Chưa có task" note={emptyMsg} />;
  return (
    <div>
      {showFilter !== false && (
        <div className="kb-filter-bar">
          <input className="search-box" type="text" placeholder="Tìm task…" value={search} onChange={e => setSearch(e.target.value)} />
          <select className="filter-select" value={fArea} onChange={e => setFArea(e.target.value)}>
            <option value="">Tất cả mảng</option>
            {AREA_OPTS.map(a => <option key={a} value={a}>{AREA_LABEL[a]}</option>)}
          </select>
          <select className="filter-select" value={fAssignee} onChange={e => setFAssignee(e.target.value)}>
            <option value="">Tất cả người</option>
            {users.filter(u => u.isActive).map(u => <option key={u.id} value={u.id}>{u.fullName}</option>)}
          </select>
          <select className="filter-select" value={fPriority} onChange={e => setFPriority(e.target.value)}>
            <option value="">Tất cả ưu tiên</option>
            {PRIORITY_OPTS.map(p => <option key={p} value={p}>{p}</option>)}
          </select>
          {hasFilter && <button className="clear-btn" onClick={clearFilters}>✕ Xoá bộ lọc</button>}
        </div>
      )}
      <div className="kanban">
        {STATUS_COLS.map(col => {
          const items = filtered.filter(t => t.status === col.k);
          return (
            <div key={col.k} className={`kb-col ${dragOver === col.k ? "drag-over" : ""}`}
              onDragOver={e => onDragOverCol(e, col.k)} onDragLeave={onDragLeaveCol} onDrop={e => onDrop(e, col.k)}>
              <div className="kb-col-head">
                <span className="dot" style={{ background: col.color }} />
                <span>{col.label}</span>
                <span className="count">{items.length}</span>
                <button className="plus" title="Thêm task" onClick={() => onAddInCol?.(col.k)}>+</button>
              </div>
              {items.map(t => {
                const u = userById[t.assigneeId];
                return (
                  <div key={t.id} className={`kb-card ${dragId === t.id ? "dragging" : ""}`}
                    draggable="true"
                    onDragStart={e => onDragStart(e, t.id)}
                    onDragEnd={onDragEnd}
                    onClick={() => onCardClick?.(t)}>
                    <div className="title">{t.title}</div>
                    <div className="meta">
                      <span className={`badge area-${t.area}`}>{AREA_LABEL[t.area] || t.area}</span>
                      <span className={`badge pri-${t.priority}`}>{t.priority}</span>
                      {u && <span className="avatar" style={{ background: u.color }} title={u.fullName}>{initials(u.fullName)}</span>}
                      {t.dueAt && <span className={`due-tag ${isOverdue(t.dueAt) ? "overdue" : ""}`}>{fmtDate(t.dueAt)}</span>}
                    </div>
                  </div>
                );
              })}
              {items.length === 0 && <div style={{ fontSize: 12, color: "var(--text-faint)", textAlign: "center", padding: "16px 0" }}>Trống</div>}
            </div>
          );
        })}
      </div>
      {hasFilter && filtered.length === 0 && <div style={{ textAlign: "center", color: "var(--text-muted)", fontSize: 13, padding: 32 }}>Không tìm thấy task nào phù hợp bộ lọc.</div>}
    </div>
  );
}

// =====================================================
// TIMELINE (Gantt-lite)
// =====================================================
function Timeline({ tasks, users, onTaskClick }) {
  const [zoom, setZoom] = useState("month"); // 'week' | 'month'
  const [groupBy, setGroupBy] = useState("area"); // 'area' | 'assignee'

  const totalDays = zoom === "week" ? 14 : 60;
  const rangeStart = useMemo(() => { const d = todayStart(); d.setDate(d.getDate() - Math.floor(totalDays / 4)); return d; }, [totalDays]);
  const rangeEnd = useMemo(() => addDays(rangeStart, totalDays), [rangeStart, totalDays]);

  const scheduled = tasks.filter(t => t.startAt && t.dueAt);
  const unscheduled = tasks.filter(t => !t.startAt || !t.dueAt);

  const userById = useMemo(() => Object.fromEntries(users.map(u => [u.id, u])), [users]);

  const groups = useMemo(() => {
    const map = new Map();
    for (const t of scheduled) {
      const key = groupBy === "area" ? t.area : (t.assigneeId || "__unassigned");
      if (!map.has(key)) map.set(key, []);
      map.get(key).push(t);
    }
    return Array.from(map.entries()).map(([key, items]) => ({
      key,
      label: groupBy === "area" ? (AREA_LABEL[key] || key) : (userById[key]?.fullName || "Chưa gán"),
      items: items.sort((a, b) => a.startAt.localeCompare(b.startAt)),
    }));
  }, [scheduled, groupBy, userById]);

  const datePct = (d) => {
    const ms = new Date(d).getTime() - rangeStart.getTime();
    return Math.max(0, Math.min(100, (ms / (totalDays * 86400000)) * 100));
  };
  const todayPct = datePct(todayStart());

  const tickCount = zoom === "week" ? 14 : 12;
  const ticks = useMemo(() => Array.from({ length: tickCount + 1 }, (_, i) => addDays(rangeStart, Math.round((i / tickCount) * totalDays))), [rangeStart, totalDays, tickCount]);

  return (
    <div>
      <div className="tl-toolbar">
        <div className="sw">
          <button className={zoom === "week" ? "on" : ""} onClick={() => setZoom("week")}>Tuần</button>
          <button className={zoom === "month" ? "on" : ""} onClick={() => setZoom("month")}>Tháng</button>
        </div>
        <div className="sw">
          <button className={groupBy === "area" ? "on" : ""} onClick={() => setGroupBy("area")}>Theo mảng</button>
          <button className={groupBy === "assignee" ? "on" : ""} onClick={() => setGroupBy("assignee")}>Theo người</button>
        </div>
        <span style={{ marginLeft: "auto", fontSize: 12, color: "var(--text-muted)" }}>
          {scheduled.length} task có lịch · {unscheduled.length} chưa lên lịch
        </span>
      </div>

      {scheduled.length === 0 ? (
        <Placeholder icon="═" title="Không có task nào có lịch" note="Thêm start_at và due_at cho task để hiển thị trên Timeline." />
      ) : (
        <div className="timeline" style={{ "--days": totalDays }}>
          <div className="tl-grid">
            <div className="tl-row tl-head">
              <div className="tl-label">Giai đoạn</div>
              <div className="tl-bars">
                {ticks.map((d, i) => (
                  <span key={i} className={daysBetween(todayStart(), d) === 0 ? "today" : ""} style={{ left: datePct(d) + "%" }}>{fmtDate(d)}</span>
                ))}
                <div className="tl-today" style={{ left: todayPct + "%" }} />
              </div>
            </div>
            {groups.map(g => (
              <React.Fragment key={g.key}>
                <div className="tl-row tl-group">
                  <div className="tl-label">{g.label}</div>
                  <div className="tl-bars" />
                </div>
                {g.items.map(t => {
                  const left = datePct(t.startAt);
                  const right = datePct(t.dueAt);
                  const width = Math.max(0.8, right - left);
                  const color = groupBy === "area" ? AREA_COLOR_VAR[t.area] : (userById[t.assigneeId]?.color || "#64748B");
                  return (
                    <div key={t.id} className="tl-row tl-task">
                      <div className="tl-label" title={t.title}>{t.title}</div>
                      <div className="tl-bars">
                        <div className="tl-today" style={{ left: todayPct + "%" }} />
                        <div
                          className="tl-bar"
                          style={{ left: left + "%", width: width + "%", background: color, opacity: t.status === "done" ? 0.45 : 1 }}
                          onClick={() => onTaskClick?.(t)}
                          title={`${t.title}\n${t.startAt} → ${t.dueAt}\nStatus: ${t.status}`}
                        >
                          {width > 8 ? t.title : ""}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </React.Fragment>
            ))}
          </div>
        </div>
      )}

      {unscheduled.length > 0 && (
        <div className="section" style={{ marginTop: 14 }}>
          <h3>Chưa lên lịch ({unscheduled.length})</h3>
          {unscheduled.map(t => (
            <div key={t.id} className="due-row" onClick={() => onTaskClick?.(t)}>
              <span className={`pri ${t.priority}`} />
              <span className="title">{t.title}</span>
              <span className={`badge area-${t.area}`}>{AREA_LABEL[t.area] || t.area}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

    const its = tasks.filter(t => t.goalId === g.id);

    return { ...g, _tasks: its, done, total: its.length, pct: its.length ? Math.round(done / its.length * 100) : 0 };

  return (
    <div>

      ) : (
        <div className="goals-grid">
          {enriched.map(g => (

              </div>
              <h3>{g.title}</h3>
              {g.description && <div style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 6 }}>{g.description}</div>}
              <div className="bar"><span style={{ width: g.pct + "%" }} /></div>
              <div className="meta">
                <span className="pct">{g.pct}%</span>

                  {expanded === g.id ? "Ẩn" : "Xem"} task
                </button>
                {perms.canManageUsers && (
                  <button className="btn ghost sm" onClick={() => { if (confirm(`Xoá goal "${g.title}"? Task con sẽ KHÔNG bị xoá nhưng sẽ mất liên kết.`)) onDeleteGoal(g.id); }}>🗑</button>
                )}

                <div className="task-list">
                  {g._tasks.length === 0 ? (
                    <div style={{ fontSize: 12, color: "var(--text-faint)", padding: 8 }}>Chưa có task nào trong mục tiêu này.</div>

                      </div>
                    ))
                  )}
                </div>
              )}
            </div>
          ))}
        </div>
      )}

  );

    if (!draft.title.trim()) return;
    onCreate({
      id: newId(), projectId,
      title: draft.title.trim(), description: draft.description || null,
      area: draft.area, dueAt: draft.dueAt || null,
      status: "open", sortOrder: 0, createdBy: currentUser.id,

    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 480 }}>

        <div className="modal-body">
          <div className="field"><label>Tên mục tiêu *</label>
            <input className="input" autoFocus value={draft.title} onChange={e => update("title", e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && draft.title.trim()) submit(); }}

          </div>
          <div className="field"><label>Mô tả</label>
            <textarea className="textarea" value={draft.description} onChange={e => update("description", e.target.value)} placeholder="Ngữ cảnh, tiêu chí thành công…" />
          </div>
          <div className="meta-grid">
            <div className="field"><label>Mảng</label>
              <select className="select" value={draft.area} onChange={e => update("area", e.target.value)}>
                {AREA_OPTS.map(a => <option key={a} value={a}>{AREA_LABEL[a]}</option>)}
              </select>
            </div>
            <div className="field"><label>Deadline</label>
              <input className="input" type="date" value={draft.dueAt || ""} onChange={e => update("dueAt", e.target.value || null)} />

          <button className="btn primary" disabled={!draft.title.trim()} onClick={submit}>Tạo</button>
        </div>
      </div>
    </div>
  );

function SettingsUsers({ users, setUsers, currentUser, toast }) {
  const update = (id, key, value) => setUsers(arr => arr.map(u => u.id === id ? { ...u, [key]: value } : u));
  const remove = (id) => {
    if (id === currentUser.id) { toast("Không thể xoá chính mình", "warn"); return; }
    if (!confirm("Vô hiệu hoá user này? Task của họ sẽ giữ nguyên nhưng họ không đăng nhập được.")) return;
    update(id, "isActive", false);
    toast("Đã vô hiệu hoá user", "warn");
  };
  const add = () => {
    const pin = prompt("PIN 4 số (1000–9999):");
    if (!pin || !/^\d{4}$/.test(pin)) { toast("PIN phải là 4 chữ số", "error"); return; }
    if (users.some(u => u.pin === pin)) { toast("PIN đã tồn tại", "error"); return; }
    const name = prompt("Tên đầy đủ:");

function TaskDetailModal({ task, users, goals, activities, currentUser, onClose, onSave, onDelete, onComment }) {
  const [draft, setDraft] = useState(task);
  const [comment, setComment] = useState("");
  useEffect(() => { setDraft(task); }, [task]);
  const perms = ROLE_PERMS[currentUser.role] || {};
  const canDelete = perms.canDeleteAnyTask || task.createdBy === currentUser.id;
  const userById = useMemo(() => Object.fromEntries(users.map(u => [u.id, u])), [users]);

  const taskActs = useMemo(() => activities
    .filter(a => a.taskId === task.id)
    .sort((a, b) => (a.createdAt || "").localeCompare(b.createdAt || "")),
  [activities, task.id]);

  const update = (k, v) => setDraft(d => ({ ...d, [k]: v }));
  const save = () => {
    const next = { ...draft };
    if (next.status === "done" && !next.doneAt) next.doneAt = new Date().toISOString();
    if (next.status !== "done") next.doneAt = null;
    onSave(next, task);
    onClose();
  };
  const del = () => {
    if (!confirm(`Xoá task "${task.title}"? Không thể hoàn tác.`)) return;
    onDelete(task.id); onClose();
  };
  const submitComment = () => {
    const text = comment.trim();
    if (!text) return;
    onComment(task.id, text);
    setComment("");
  };

  const renderActivityText = (a) => {
    const u = userById[a.userId];
    const who = u?.fullName || "Ai đó";
    if (a.kind === "comment") return null;
    if (a.kind === "created") return `${who} đã tạo task này`;
    if (a.kind === "status_change") return `${who} chuyển trạng thái ${a.payload.from || "?"} → ${a.payload.to || "?"}`;
    if (a.kind === "assigned") {
      const to = a.payload.toName || userById[a.payload.to]?.fullName || "Chưa gán";
      return `${who} đã gán cho ${to}`;
    }
    if (a.kind === "edited") return `${who} đã sửa ${a.payload.field || "task"}`;
    return `${who} · ${a.kind}`;
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <input className="title-edit" value={draft.title} onChange={e => update("title", e.target.value)} placeholder="Tên task" />
          <button className="close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div className="meta-grid">
            <div className="field"><label>Trạng thái</label>
              <select className="select" value={draft.status} onChange={e => update("status", e.target.value)}>
                {STATUS_COLS.map(c => <option key={c.k} value={c.k}>{c.label}</option>)}
              </select>
            </div>
            <div className="field"><label>Ưu tiên</label>
              <select className="select" value={draft.priority} onChange={e => update("priority", e.target.value)}>
                {PRIORITY_OPTS.map(p => <option key={p} value={p}>{p}</option>)}
              </select>
            </div>
            <div className="field"><label>Mảng</label>
              <select className="select" value={draft.area} onChange={e => update("area", e.target.value)}>
                {AREA_OPTS.map(a => <option key={a} value={a}>{AREA_LABEL[a]}</option>)}
              </select>
            </div>
            <div className="field"><label>Người phụ trách</label>
              <select className="select" value={draft.assigneeId || ""} onChange={e => update("assigneeId", e.target.value || null)}>
                <option value="">— Chưa gán —</option>
                {users.filter(u => u.isActive).map(u => <option key={u.id} value={u.id}>{u.fullName}</option>)}
              </select>
            </div>
            <div className="field"><label>Bắt đầu</label>
              <input className="input" type="date" value={draft.startAt || ""} onChange={e => update("startAt", e.target.value || null)} />
            </div>
            <div className="field"><label>Deadline</label>
              <input className="input" type="date" value={draft.dueAt || ""} onChange={e => update("dueAt", e.target.value || null)} />
            </div>
            <div className="field" style={{ gridColumn: "1 / -1" }}><label>Mục tiêu</label>
              <select className="select" value={draft.goalId || ""} onChange={e => update("goalId", e.target.value || null)}>
                <option value="">— Không liên kết —</option>
                {goals.map(g => <option key={g.id} value={g.id}>{g.title}</option>)}
              </select>
            </div>
          </div>
          <div className="field">
            <label>Mô tả</label>
            <textarea className="textarea" value={draft.description || ""} onChange={e => update("description", e.target.value)} placeholder="Mô tả, link tài liệu, ghi chú…" />
          </div>

          <div className="activity-section">
            <h4>Lịch sử & bình luận</h4>
            <div className="activity-list">
              {taskActs.length === 0 ? (
                <div style={{ fontSize: 12, color: "var(--text-faint)" }}>Chưa có hoạt động nào.</div>
              ) : taskActs.map(a => {
                const u = userById[a.userId];
                const isSystem = a.kind !== "comment";
                return (
                  <div key={a.id} className={`activity-item ${isSystem ? "system" : ""}`}>
                    <span className="av" style={{ background: u?.color || "#94A3B8" }}>{initials(u?.fullName)}</span>
                    <div className="body">
                      {isSystem ? (
                        <div className="text">
                          {renderActivityText(a)}
                          <span className="when">{fmtRelative(a.createdAt)}</span>
                        </div>
                      ) : (
                        <>
                          <span className="who">{u?.fullName || "Ai đó"}</span>
                          <span className="when">{fmtRelative(a.createdAt)}</span>
                          <div className="text">{a.payload.text}</div>
                        </>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="comment-input">
              <textarea
                value={comment} onChange={e => setComment(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) { e.preventDefault(); submitComment(); } }}
                placeholder="Viết bình luận… (Ctrl+Enter để gửi)"
              />
              <button className="btn primary sm" disabled={!comment.trim()} onClick={submitComment}>Gửi</button>
            </div>
          </div>
        </div>
        <div className="modal-foot">
          {canDelete && <button className="btn danger" onClick={del} style={{ marginRight: "auto" }}>Xoá task</button>}
          <button className="btn" onClick={onClose}>Huỷ</button>
          <button className="btn primary" onClick={save}>Lưu</button>
        </div>
      </div>
    </div>
  );
}

// =====================================================
// APP
// =====================================================
function App() {
  const { toasts, toast } = useToast();
  const toastRef = useRef(toast);
  useEffect(() => { toastRef.current = toast; }, [toast]);
  const onSyncError = useCallback((msg) => toastRef.current?.(msg, "error"), []);

  const [users,      setUsers,      usersMeta]      = useStateSync("users",      userFromDb,     userToDb,     onSyncError);
  const [projects,   setProjects,   projectsMeta]   = useStateSync("projects",   projectFromDb,  projectToDb,  onSyncError);
  const [goals,      setGoals,      goalsMeta]      = useStateSync("goals",      goalFromDb,     goalToDb,     onSyncError);
  const [tasks,      setTasks,      tasksMeta]      = useStateSync("tasks",      taskFromDb,     taskToDb,     onSyncError);
  const [activities, setActivities, activitiesMeta] = useStateSync("activities", activityFromDb, activityToDb, onSyncError);

  const loading = usersMeta.loading || projectsMeta.loading || goalsMeta.loading || tasksMeta.loading;
  const fatalError = usersMeta.error || projectsMeta.error || goalsMeta.error || tasksMeta.error;

  const [currentUser, setCurrentUser] = useState(null);
  const [screen,    setScreen]    = useState("dashboard");
  const [sbOpen,    setSbOpen]    = useState(false);
  const [connStatus, setConnStatus] = useState(SUPABASE_READY ? "connecting" : "mock");

  const [openTask,  setOpenTask]  = useState(null);
  const [quickAdd,  setQuickAdd]  = useState(null);
  const [goalAdd,   setGoalAdd]   = useState(false);
  const [notifEnabled, setNotifEnabled] = useState(() => localStorage.getItem("leadhub_notif") === "1");

  const project = projects[0] || null;

  // Auto-login
  useEffect(() => {
    if (usersMeta.loading) return;
    const savedPin = localStorage.getItem("leadhub_pin");
    if (!savedPin) return;
    const u = users.find(x => x.pin === savedPin && x.isActive);
    if (u) setCurrentUser(u);
    else localStorage.removeItem("leadhub_pin");
  }, [usersMeta.loading, users]);

  // Realtime channel — subscribe 4 tables after user logs in
  useEffect(() => {
    if (!currentUser || !sb) return;
    setConnStatus("connecting");
    let timer = null;
    const ch = sb.channel("leadhub-main")
      .on("postgres_changes", { event: "*", schema: "public", table: "tasks" },      p => tasksMeta.applyRemote(p))
      .on("postgres_changes", { event: "*", schema: "public", table: "goals" },      p => goalsMeta.applyRemote(p))
      .on("postgres_changes", { event: "*", schema: "public", table: "users" },      p => usersMeta.applyRemote(p))
      .on("postgres_changes", { event: "*", schema: "public", table: "activities" }, p => activitiesMeta.applyRemote(p))
      .subscribe(status => {
        if (status === "SUBSCRIBED")    setConnStatus("live");
        else if (status === "CHANNEL_ERROR" || status === "CLOSED") {
          setConnStatus("offline");
          if (timer) clearTimeout(timer);
          timer = setTimeout(() => { try { ch.subscribe(); setConnStatus("connecting"); } catch {} }, 5000);
        }
      });
    return () => {
      if (timer) clearTimeout(timer);
      try { sb.removeChannel(ch); } catch {}
    };
  }, [currentUser, tasksMeta.applyRemote, goalsMeta.applyRemote, usersMeta.applyRemote, activitiesMeta.applyRemote]);

  const logout = () => {
    localStorage.removeItem("leadhub_pin");
    setCurrentUser(null); setScreen("dashboard");
  };
  const retryFetch = () => { window.location.reload(); };

  // ----- ACTIVITY HELPER -----
  const logActivity = useCallback((taskId, kind, payload = {}) => {
    if (!currentUser) return;
    setActivities(arr => [...arr, {
      id: newId(), taskId, userId: currentUser.id,
      kind, payload, createdAt: new Date().toISOString(),
    }]);
  }, [currentUser, setActivities]);

  // ----- TASK MUTATIONS -----
  const createTask = (t) => {
    setTasks(arr => [...arr, t]);
    logActivity(t.id, "created");
    toast("Đã tạo task", "success");
  };
  const updateTask = (next, original) => {
    setTasks(arr => arr.map(t => t.id === next.id ? { ...next, updatedAt: new Date().toISOString() } : t));
    if (original && original.status !== next.status) logActivity(next.id, "status_change", { from: original.status, to: next.status });
    if (original && original.assigneeId !== next.assigneeId) {
      const to = users.find(u => u.id === next.assigneeId);
      logActivity(next.id, "assigned", { to: next.assigneeId, toName: to?.fullName || "Chưa gán" });
    }
    if (original && original.title !== next.title)             logActivity(next.id, "edited", { field: "title" });
    if (original && original.description !== next.description) logActivity(next.id, "edited", { field: "mô tả" });
    toast("Đã lưu task", "success");
  };
  const deleteTask = (id) => {
    setTasks(arr => arr.filter(t => t.id !== id));
    toast("Đã xoá task", "warn");
  };
  const commentTask = (taskId, text) => logActivity(taskId, "comment", { text });

  // ----- GOAL MUTATIONS -----
  const createGoal = (g) => { setGoals(arr => [...arr, g]); toast("Đã tạo mục tiêu", "success"); };
  const deleteGoal = (id) => {
    setGoals(arr => arr.filter(g => g.id !== id));
    setTasks(arr => arr.map(t => t.goalId === id ? { ...t, goalId: null } : t));
    toast("Đã xoá mục tiêu", "warn");
  };

  // ----- DRAG-DROP MOVE TASK -----
  const moveTask = (task, newStatus) => {
    const next = { ...task, status: newStatus, updatedAt: new Date().toISOString() };
    if (newStatus === "done" && !next.doneAt) next.doneAt = new Date().toISOString();
    if (newStatus !== "done") next.doneAt = null;
    setTasks(arr => arr.map(t => t.id === next.id ? next : t));
    logActivity(next.id, "status_change", { from: task.status, to: newStatus });
    toast(`Chuyển "${task.title}" → ${newStatus}`, "success");
  };

  // ----- EXPORT CSV -----
  const handleExport = () => exportTasksCsv(tasks, users, goals);

  // ----- NOTIFICATION -----
  const toggleNotif = async () => {
    if (!notifEnabled) {
      const perm = await requestNotifPermission();
      if (perm === "granted") { setNotifEnabled(true); localStorage.setItem("leadhub_notif", "1"); toast("Đã bật thông báo trình duyệt", "success"); }
      else if (perm === "unsupported") toast("Trình duyệt không hỗ trợ thông báo", "warn");
      else toast("Bạn đã từ chối quyền thông báo. Vào cài đặt trình duyệt để bật lại.", "warn");
    } else {
      setNotifEnabled(false); localStorage.removeItem("leadhub_notif");
      toast("Đã tắt thông báo", "info");
    }
  };
  const overdueCount = useMemo(() => tasks.filter(t => isOverdue(t.dueAt) && t.status !== "done").length, [tasks]);

  // Send notification once when overdue tasks detected
  const lastNotifRef = useRef(0);
  useEffect(() => {
    if (!notifEnabled || !currentUser || overdueCount === 0) return;
    const now = Date.now();
    if (now - lastNotifRef.current < 1800000) return; // max once per 30min
    lastNotifRef.current = now;
    sendNotif("LeadHub — Task quá hạn", `Bạn có ${overdueCount} task đã quá deadline. Kiểm tra ngay!`);
  }, [notifEnabled, currentUser, overdueCount]);

  // ----- LOGIN GATE -----
  if (!currentUser) {
    return (
      <>
        <LoginScreen users={users} loading={usersMeta.loading} error={usersMeta.error} onLogin={setCurrentUser} toast={toast} onRetry={retryFetch} />
        <ToastStack toasts={toasts} />
      </>
    );
  }

  // ----- MAIN APP -----
  const myTasks = tasks.filter(t => t.assigneeId === currentUser.id);
  const screenTitle = NAV_ITEMS.find(n => n.k === screen)?.label || "LeadHub";
  const perms = ROLE_PERMS[currentUser.role] || {};

  let body;
  if (loading) {
    body = <div className="loading-shell"><div className="spinner" /> Đang tải dữ liệu…</div>;
  } else if (fatalError) {
    body = (
      <div className="error-banner">
        <b>Lỗi tải dữ liệu</b>{fatalError.message || String(fatalError)}
        <div style={{ marginTop: 8 }}><button className="btn sm" onClick={retryFetch}>Tải lại</button></div>
      </div>
    );
  } else {
    switch (screen) {
      case "dashboard":
        body = <Dashboard tasks={tasks} goals={goals} onOpenTask={setOpenTask} />; break;
      case "kanban":
        body = <Kanban tasks={tasks} users={users} onCardClick={setOpenTask} onAddInCol={(s) => setQuickAdd({ status: s })} onMoveTask={moveTask} emptyMsg="Bấm '+ Task' để tạo task đầu tiên." showFilter />; break;
      case "timeline":
        body = <Timeline tasks={tasks} users={users} onTaskClick={setOpenTask} />; break;
      case "goals":
        body = <GoalsView goals={goals} tasks={tasks} users={users} onOpenTask={setOpenTask} onCreateGoal={() => setGoalAdd(true)} onUpdateGoal={(g) => setGoals(arr => arr.map(x => x.id === g.id ? g : x))} onDeleteGoal={deleteGoal} currentUser={currentUser} />; break;
      case "mytasks":
        body = <Kanban tasks={myTasks} users={users} onCardClick={setOpenTask} onAddInCol={(s) => setQuickAdd({ status: s })} onMoveTask={moveTask} emptyMsg="Bạn chưa được gán task nào. Bấm '+ Task' để tự tạo." showFilter />; break;
      case "settings":
        body = perms.canManageUsers
          ? <SettingsView users={users} setUsers={setUsers} project={project} setProjects={setProjects} currentUser={currentUser} toast={toast} />
          : <Placeholder icon="🔒" title="Không có quyền" note="Chỉ lead_pm mới truy cập được Cài đặt." />;
        break;
      default:
        body = <Placeholder icon="?" title="Không tìm thấy" note="Màn hình không hợp lệ." />;
    }
  }

  return (
    <>
      <div className="app-shell">
        <Sidebar open={sbOpen} onClose={() => setSbOpen(false)} screen={screen} setScreen={setScreen}
          currentUser={currentUser} projectName={project?.name} onLogout={logout} connStatus={connStatus} />
        <main className="app-main">
          <TopBar title={screenTitle} onMenu={() => setSbOpen(true)} onQuickAdd={() => setQuickAdd({ status: "todo" })}
            onExport={handleExport} notifEnabled={notifEnabled} onToggleNotif={toggleNotif} overdueCount={overdueCount} />
          <div className="content">{body}</div>
        </main>
      </div>

      {openTask && (
        <TaskDetailModal
          task={openTask} users={users} goals={goals} activities={activities} currentUser={currentUser}
          onClose={() => setOpenTask(null)} onSave={updateTask} onDelete={deleteTask} onComment={commentTask}
        />
      )}
      {quickAdd && project && (
        <QuickCreateModal users={users} goals={goals} currentUser={currentUser}
          projectId={project.id} initialStatus={quickAdd.status} initialGoalId={quickAdd.goalId}
          onClose={() => setQuickAdd(null)} onCreate={createTask} />
      )}
      {goalAdd && project && (
        <GoalCreateModal projectId={project.id} currentUser={currentUser}
          onClose={() => setGoalAdd(false)} onCreate={createGoal} />
      )}

      <ToastStack toasts={toasts} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
